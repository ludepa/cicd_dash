# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "deploy_dash"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-classic-stable-af2etd.cloud.databricks.com/
  
  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://fevm-classic-stable-af2etd.cloud.databricks.com/
      # We always use /Users/lucas.depaula@databricks.com for all resources to make sure we only have a single copy.
      root_path: /Users/lucas.depaula@databricks.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as lucas.depaula@databricks.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: lucas.depaula@databricks.com

variables:
  warehouse_id:
    default: 32e67e18218e335e
